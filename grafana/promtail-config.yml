server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: windmill_logs
  static_configs:
  - targets:
      - localhost
    labels:
      job: windmill
      __path__: /var/log/windmill/*.log
  pipeline_stages:
  - json:
      expressions:
        level: level
        msg: msg
        time: time
        metadata: metadata
  - labels:
      level:
  - timestamp:
      source: time
      format: RFC3339
